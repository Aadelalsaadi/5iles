<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
let files = [];

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

function addFiles(newFiles) {
  Array.from(newFiles).forEach(f => {
    if (!f.name.toLowerCase().endsWith('.pdf')) { showToast('Only PDF files are supported', 'error'); return; }
    files.push(f);
    renderQueueItem(f);
  });
  if (files.length > 0) {
    document.getElementById('options-row').style.display = 'flex';
    document.getElementById('action-row').style.display = 'flex';
  }
}

function renderQueueItem(file) {
  const size = file.size > 1024*1024 ? (file.size/1024/1024).toFixed(1)+' MB' : (file.size/1024).toFixed(0)+' KB';
  const id = file.name.replace(/\W/g,'_');
  const div = document.createElement('div');
  div.className = 'queue-item'; div.id = 'qi-'+id;
  div.innerHTML = `<div class="qi-icon">📄</div><div class="qi-info"><div class="qi-name">${file.name}</div><div class="qi-size">${size}</div><div class="qi-prog"><div class="qi-prog-fill" id="pf-${id}"></div></div></div><div class="qi-status" id="ps-${id}" style="color:var(--ink3)">Pending</div><button class="qi-remove" onclick="removeFile('${file.name}')">×</button>`;
  document.getElementById('queue').appendChild(div);
}

function removeFile(name) {
  files = files.filter(f => f.name !== name);
  const el = document.getElementById('qi-'+name.replace(/\W/g,'_'));
  if (el) el.remove();
  if (files.length === 0) { document.getElementById('options-row').style.display='none'; document.getElementById('action-row').style.display='none'; }
}

async function processFiles() {
  if (!files.length) return;
  const btn = document.getElementById('process-btn');
  btn.disabled = true; btn.textContent = '⏳ Converting…';

  const area = document.getElementById('output-area');
  const filesDiv = document.getElementById('output-files');
  filesDiv.innerHTML = '';
  let anySuccess = false;

  for (const f of files) {
    const id = f.name.replace(/\W/g,'_');
    const pfEl = document.getElementById('pf-'+id);
    const psEl = document.getElementById('ps-'+id);
    if (psEl) { psEl.textContent = 'Converting…'; psEl.style.color = 'var(--amber,#c47d0e)'; }
    if (pfEl) pfEl.style.width = '40%';

    try {
      const formData = new FormData();
      formData.append('file', f);
      formData.append('quality', document.getElementById('compress-slider').value);

      const res = await fetch('/.netlify/functions/pdf-to-jpg', {
        method: 'POST',
        body: formData
      });

      if (!res.ok) throw new Error('Conversion failed');

      const urls = await res.json(); // expects array of JPG URLs
      if (pfEl) pfEl.style.width = '100%';
      if (psEl) { psEl.textContent = 'Done'; psEl.style.color = 'var(--accent)'; }

      urls.forEach((url, i) => {
        const div = document.createElement('div');
        div.className = 'output-file';
        div.innerHTML = `<span style="font-size:20px">🖼️</span><div style="flex:1"><div style="font-size:14px;font-weight:500">${f.name.replace('.pdf','')} - page ${i+1}.jpg</div></div><a class="btn btn-primary btn-sm" href="${url}" download="page-${i+1}.jpg">⬇ Download</a>`;
        filesDiv.appendChild(div);
      });
      anySuccess = true;

    } catch(err) {
      if (psEl) { psEl.textContent = 'Failed'; psEl.style.color = '#b02e4a'; }
      showToast('Failed to convert ' + f.name, 'error');
    }
  }

  btn.disabled = false; btn.textContent = '🖼️ Convert to JPG';
  if (anySuccess) {
    area.classList.add('show');
    area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    showToast('Conversion complete!', 'success');
  }
}

function clearAll() { files = []; document.getElementById('queue').innerHTML=''; document.getElementById('output-area').classList.remove('show'); document.getElementById('options-row').style.display='none'; document.getElementById('action-row').style.display='none'; }

function toggleFaq(btn) {
  const item = btn.closest('.faq-item');
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(i => i.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}

function showToast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
