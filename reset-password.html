html<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password – 5iles</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background:#0f0f0f; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .box { background:#1a1a1a; padding:32px; border-radius:12px; width:100%; max-width:400px; }
    h2 { margin-bottom:8px; }
    input { width:100%; padding:10px; margin:8px 0 16px; border-radius:8px; border:1px solid #333; background:#2a2a2a; color:#fff; box-sizing:border-box; }
    button { width:100%; padding:12px; background:#7c3aed; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:16px; }
    #msg { margin-top:12px; text-align:center; font-size:13px; }
  </style>
</head>
<body>
<div class="box">
  <h2>Set new password</h2>
  <p style="color:#aaa;font-size:14px">Enter your new password below.</p>
  <input type="password" id="newPassword" placeholder="New password (min 6 characters)">
  <input type="password" id="confirmPassword" placeholder="Confirm new password">
  <button onclick="updatePassword()">Update password</button>
  <div id="msg"></div>
</div>
<script>
  const _supabase = supabase.createClient(
    'https://rwmagyyayscaqvjrft.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3bWFneXlheXNjYXF2anJmdCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzQ2MDUxMTMxLCJleHAiOjIwNjE2MjcxMzF9.gQclQDMDMVGTFbSY924X7cSfAOUBOBMvRJ-T4VTZQdo'
  );

  async function updatePassword() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const msg = document.getElementById('msg');

    if (newPassword.length < 6) {
      msg.style.color = '#ff4d4d';
      msg.textContent = '✗ Password must be at least 6 characters.';
      return;
    }
    if (newPassword !== confirmPassword) {
      msg.style.color = '#ff4d4d';
      msg.textContent = '✗ Passwords do not match.';
      return;
    }

    const { error } = await _supabase.auth.updateUser({ password: newPassword });
    if (error) {
      msg.style.color = '#ff4d4d';
      msg.textContent = '✗ ' + error.message;
    } else {
      msg.style.color = '#4ade80';
      msg.textContent = '✅ Password updated! Redirecting...';
      setTimeout(() => window.location.href = '/', 2000);
    }
  }
</script>
</body>
</html>
